<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Israel Junior Open 2027</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/css/style.css">
<style>
  .nf-wrap {
    min-height: 100vh; background: var(--navy); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 2rem; color: #fff;
  }
  .nf-wrap::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 70% 60% at 30% 25%, rgba(0,61,143,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 75%, rgba(0,159,216,0.25) 0%, transparent 55%);
  }
  .nf-inner { position: relative; z-index: 1; max-width: 540px; }
  .nf-logo { width: 96px; height: 96px; border-radius: 50%; margin-bottom: 1.75rem; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .nf-code { font-family: var(--display); font-size: clamp(4.5rem, 18vw, 8rem); font-weight: 700; line-height: 1; color: #37b6e6; letter-spacing: 0.02em; }
  .nf-title { font-family: var(--display); font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 600; margin: 0.5rem 0 0.75rem; }
  .nf-text { font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 2rem; }
  .nf-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .nf-btn { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; padding: 0.9rem 2rem; border-radius: 100px; transition: transform 0.15s, box-shadow 0.2s; }
  .nf-btn-primary { background: var(--cyan); color: var(--navy); box-shadow: 0 4px 20px rgba(0,159,216,0.35); }
  .nf-btn-primary:hover { transform: translateY(-2px); }
  .nf-btn-outline { border: 1.5px solid rgba(255,255,255,0.3); color: #fff; }
  .nf-btn-outline:hover { border-color: var(--cyan); color: #37b6e6; }
</style>
</head>
<body>
<div class="nf-wrap">
  <div class="nf-inner">
    <img class="nf-logo" src="/img/instagram-profile.jpg" alt="Israel Junior Open 2027">
    <div class="nf-code">404</div>
    <h1 class="nf-title">Page Not Found</h1>
    <p class="nf-text">The page you are looking for doesn’t exist or may have moved. Let’s get you back to the Israel Junior Open 2027.</p>
    <div class="nf-actions">
      <a class="nf-btn nf-btn-primary" href="/">Back to Home</a>
      <a class="nf-btn nf-btn-outline" href="/contact.html">Contact Us</a>
    </div>
  </div>
</div>
</body>
</html>
